name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @wishtracker/shared build

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Type check
        run: pnpm type-check

      - name: Lint & format check
        run: pnpm exec biome check backend web mobile extension packages/shared

      - name: Test
        run: pnpm test

      - name: Build backend
        run: pnpm --filter wishtracker-backend run build

      - name: Build web
        run: pnpm --filter wishtracker-web run build

      - name: Build extension
        run: pnpm --filter wishtracker-extension run build
