pre-commit:
  commands:
    biome-check:
      priority: 1
      glob: "*.{ts,tsx,js,jsx,json}"
      run: pnpm exec biome check {staged_files}
      stage_fixed: true

    prisma-generate:
      priority: 2
      run: pnpm db:generate

    type-check:
      priority: 3
      run: pnpm type-check

pre-push:
  commands:
    test:
      run: pnpm test
