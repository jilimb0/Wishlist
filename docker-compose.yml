services:
  postgres:
    image: postgres:16-alpine
    container_name: wishtracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: wishtracker
      POSTGRES_PASSWORD: wishtracker
      POSTGRES_DB: wishtracker
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wishtracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: wishtracker-api
    restart: unless-stopped
    ports:
      - '3010:3010'
    environment:
      DATABASE_URL: postgresql://wishtracker:wishtracker@postgres:5432/wishtracker?schema=public
      JWT_SECRET: change-this-secret-in-production
      JWT_EXPIRES_IN: 7d
      PORT: 3010
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
